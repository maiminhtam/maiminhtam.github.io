<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  :root {
    --navy: #0a1628;
    --navy-light: #132240;
    --navy-mid: #1a3160;
    --blue: #2563eb;
    --blue-light: #3b82f6;
    --blue-accent: #60a5fa;
    --blue-pale: #dbeafe;
    --blue-wash: #eff6ff;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --green: #16a34a;
    --red: #dc2626;
    --orange: #d97706;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 3px rgba(10,22,40,0.06);
    --shadow-md: 0 4px 16px rgba(10,22,40,0.08);
    --shadow-lg: 0 8px 32px rgba(10,22,40,0.12);
    --shadow-xl: 0 16px 48px rgba(10,22,40,0.16);

  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--gray-50); color: var(--gray-800); line-height: 1.6; -webkit-font-smoothing: antialiased; }

  .site-header { background: var(--navy); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .header-inner { max-width: 1280px; margin: 0 auto; padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .header-brand { display: flex; align-items: center; gap: 14px; }
  .header-logo { width: 36px; height: 36px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 14px; letter-spacing: -0.5px; }
  .header-title { color: white; font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .header-title span { color: var(--gray-400); font-weight: 400; margin: 0 6px; }
  .header-subtitle { color: var(--gray-400); font-size: 13px; font-weight: 400; }

  .viewer { width: 100vw; height: calc(100vh - 64px); background: var(--white); display: flex; flex-direction: column; overflow: hidden; }
  .viewer-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); flex-shrink: 0; }
  .viewer-title { font-size: 15px; font-weight: 600; color: var(--navy); }
  .viewer-title span { color: var(--gray-400); font-weight: 400; }
  .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1px solid var(--gray-200); background: white; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--gray-600); cursor: pointer; transition: all var(--transition); font-family: var(--font-body); text-decoration: none; }
  .back-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-wash); }
  .viewer-body { flex: 1; display: flex; overflow: hidden; }
  .slide-nav { width: 220px; border-right: 1px solid var(--gray-200); background: var(--gray-50); overflow-y: auto; flex-shrink: 0; padding: 12px; transition: width var(--transition), padding var(--transition), opacity var(--transition); }
  .slide-nav.collapsed { width: 0; padding: 12px 0; overflow: hidden; border-right: none; opacity: 0; }
  .nav-toggle { width: 36px; height: 36px; border: 1px solid var(--gray-200); background: white; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--gray-500); transition: all var(--transition); flex-shrink: 0; margin-right: 10px; }
  .nav-toggle:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-wash); }
  .nav-toggle svg { width: 18px; height: 18px; transition: transform var(--transition); }
  .nav-toggle.collapsed svg { transform: rotate(180deg); }
  .slide-nav-item { padding: 10px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); margin-bottom: 2px; font-size: 13px; color: var(--gray-600); font-weight: 500; display: flex; align-items: center; gap: 10px; }
  .slide-nav-item:hover { background: var(--gray-100); color: var(--gray-800); }
  .slide-nav-item.active { background: var(--blue); color: white; }
  .slide-nav-num { font-family: var(--font-mono); font-size: 10px; font-weight: 700; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: rgba(0,0,0,0.06); flex-shrink: 0; }
  .slide-nav-item.active .slide-nav-num { background: rgba(255,255,255,0.2); }
  .slide-content { flex: 1; overflow-y: auto; padding: 0; }
  .slide { display: none; min-height: 100%; }
  .slide.active { display: block; }

  .slide-title-agenda { display: flex; min-height: calc(100vh - 64px - 65px - 49px); }
  .title-left { width: 42%; background: var(--navy); padding: 60px 40px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
  .title-left::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--blue); }
  .title-left::after { content: ''; position: absolute; bottom: -80px; right: -80px; width: 250px; height: 250px; background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%); }
  .title-main { font-size: 36px; font-weight: 700; color: white; letter-spacing: -1px; line-height: 1.15; margin-bottom: 12px; }
  .title-date { font-size: 20px; color: var(--gray-400); font-weight: 400; }
  .title-right { width: 58%; padding: 60px 48px; display: flex; flex-direction: column; justify-content: center; }
  .agenda-heading { font-size: 28px; font-weight: 700; color: var(--navy); margin-bottom: 28px; letter-spacing: -0.5px; }
  .agenda-item { margin-bottom: 20px; }
  .agenda-item-title { display: flex; align-items: baseline; gap: 10px; font-size: 15px; font-weight: 600; color: var(--gray-800); margin-bottom: 4px; }
  .agenda-num { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--blue); min-width: 20px; }
  .agenda-sub { padding-left: 30px; font-size: 13px; color: var(--gray-500); line-height: 1.7; }

  .slide-page { padding: 40px 44px; }
  .slide-page-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; position: relative; padding-bottom: 16px; }
  .slide-page-header::after { content: ''; position: absolute; bottom: 0; left: 0; width: 48px; height: 3px; background: var(--blue); border-radius: 2px; }
  .slide-page-title { font-size: 24px; font-weight: 700; color: var(--navy); letter-spacing: -0.5px; }
  .slide-section-label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gray-400); }

  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .project-card { border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; background: white; }
  .card-header { background: var(--navy); padding: 12px 18px; font-size: 13px; font-weight: 600; color: white; letter-spacing: -0.2px; }
  .card-body { padding: 18px; }
  .card-section { margin-bottom: 14px; }
  .card-section:last-child { margin-bottom: 0; }
  .card-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--blue); margin-bottom: 6px; }
  .card-section-label.risk { color: var(--orange); }
  .card-section-label.target { color: var(--blue); }
  .card-bullets { list-style: none; padding: 0; }
  .card-bullets li { font-size: 12.5px; color: var(--gray-700); line-height: 1.55; padding-left: 14px; position: relative; margin-bottom: 4px; }
  .card-bullets li::before { content: ''; position: absolute; left: 0; top: 7px; width: 4px; height: 4px; background: var(--blue-light); border-radius: 50%; }
  .card-bullets ul { list-style: none; padding-left: 16px; margin-top: 4px; }
  .card-bullets ul li { font-size: 12px; color: var(--gray-600); }
  .card-bullets ul li::before { background: var(--gray-400); width: 3px; height: 3px; top: 8px; }
  .target-date { font-size: 12.5px; font-weight: 600; color: var(--blue); }

  .release-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .release-card { border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; background: white; }
  .release-header { background: var(--navy); padding: 12px 18px; font-size: 13px; font-weight: 600; color: white; }
  .release-body { padding: 18px; }
  .release-group { margin-bottom: 16px; }
  .release-group:last-child { margin-bottom: 0; }
  .release-group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--blue); margin-bottom: 6px; }
  .release-body .card-bullets li::before { background: var(--gray-400); }

  .resources-table-wrap { overflow-x: auto; }
  .resources-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12.5px; border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; }
  .resources-table thead th { background: var(--navy); color: white; padding: 11px 14px; text-align: left; font-weight: 600; font-size: 12px; letter-spacing: 0.3px; white-space: nowrap; border: none; }
  .resources-table thead th:first-child { width: 44px; text-align: center; }
  .resources-table tbody td { padding: 9px 14px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); vertical-align: top; }
  .resources-table tbody td:first-child { text-align: center; color: var(--gray-400); font-family: var(--font-mono); font-size: 11px; }
  .resources-table tbody tr:nth-child(even) td { background: var(--gray-50); }
  .resources-table tbody tr:last-child td { border-bottom: none; }
  .status-green { color: var(--green); font-weight: 500; }
  .status-blue { color: var(--blue); font-weight: 500; }
  .status-red { color: var(--red); font-weight: 600; }
  .status-orange { color: var(--orange); font-weight: 500; }

  .slide-closing { min-height: calc(100vh - 64px - 65px - 49px); background: var(--navy); display: flex; align-items: center; justify-content: center; text-align: center; padding: 60px; position: relative; overflow: hidden; }
  .slide-closing::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--blue); }
  .slide-closing::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%); pointer-events: none; }
  .closing-content { position: relative; z-index: 1; }
  .closing-thanks { font-size: 48px; font-weight: 700; color: white; letter-spacing: -1.5px; margin-bottom: 12px; }
  .closing-sub { font-size: 16px; color: var(--gray-400); margin-bottom: 8px; }
  .closing-italic { font-size: 15px; color: var(--gray-500); font-style: italic; margin-bottom: 32px; }
  .closing-footer { font-family: var(--font-mono); font-size: 11px; color: var(--gray-500); letter-spacing: 1px; text-transform: uppercase; }

  .viewer-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-top: 1px solid var(--gray-200); background: var(--gray-50); flex-shrink: 0; }
  .nav-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border: 1px solid var(--gray-200); background: white; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--gray-600); cursor: pointer; transition: all var(--transition); font-family: var(--font-body); }
  .nav-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-wash); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn:disabled:hover { border-color: var(--gray-200); color: var(--gray-600); background: white; }
  .slide-counter { font-family: var(--font-mono); font-size: 12px; color: var(--gray-400); }

  @media (max-width: 768px) {
    .header-inner { padding: 0 20px; }
    .slide-nav { width: 180px; }
    .slide-title-agenda { flex-direction: column; }
    .title-left, .title-right { width: 100%; }
    .card-grid, .release-grid { grid-template-columns: 1fr; }
    .slide-page { padding: 24px; }
  }
</style>
</head>

let currentSlideIndex = 0;

function renderDeck() {
  const nav = document.getElementById('slide-nav');
  const content = document.getElementById('slide-content');
  nav.innerHTML = '';
  content.innerHTML = '';
  slides.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = `slide-nav-item ${i === 0 ? 'active' : ''}`;
    item.innerHTML = `<span class="slide-nav-num">${i + 1}</span>${s.name}`;
    item.addEventListener('click', () => goToSlide(i));
    nav.appendChild(item);

    const div = document.createElement('div');
    div.className = `slide ${i === 0 ? 'active' : ''}`;
    div.innerHTML = getSlideHTML(s.type);
    content.appendChild(div);
  });
  updateNav();
}

function goToSlide(index) {
  if (index < 0 || index >= slides.length) return;
  currentSlideIndex = index;
  document.querySelectorAll('#slide-content .slide').forEach((s, i) => s.classList.toggle('active', i === index));
  document.querySelectorAll('.slide-nav-item').forEach((item, i) => item.classList.toggle('active', i === index));
  const activeNavItem = document.querySelectorAll('.slide-nav-item')[index];
  if (activeNavItem) activeNavItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  document.getElementById('slide-content').scrollTop = 0;
  updateNav();
}

function updateNav() {
  document.getElementById('btn-prev').disabled = currentSlideIndex === 0;
  document.getElementById('btn-next').disabled = currentSlideIndex === slides.length - 1;
  document.getElementById('slide-counter').textContent = `${currentSlideIndex + 1} / ${slides.length}`;
}

document.getElementById('btn-prev').addEventListener('click', () => goToSlide(currentSlideIndex - 1));
document.getElementById('btn-next').addEventListener('click', () => goToSlide(currentSlideIndex + 1));
document.getElementById('btn-toggle-nav').addEventListener('click', () => {
  document.getElementById('slide-nav').classList.toggle('collapsed');
  document.getElementById('btn-toggle-nav').classList.toggle('collapsed');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goToSlide(currentSlideIndex - 1);
  if (e.key === 'ArrowRight') goToSlide(currentSlideIndex + 1);
});

renderDeck();
</script>
